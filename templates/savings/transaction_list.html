{% extends 'base.html' %}

{% block content %}
<div class="card">
    <div class="card-header d-flex justify-content-between align-items-center">
        <h5 class="mb-0">Savings Transactions</h5>
        <a class="btn btn-success btn-sm" href="{% url 'savings_transaction_add' %}">+ Add Transaction</a>
    </div>
    <div class="search-controls p-3">
        <div class="d-flex gap-2">
            <div class="input-group input-group-sm flex-fill">
                <span class="input-group-text">Account No</span>
                <input id="trans-search-account" type="search" class="form-control" placeholder="Search by account number">
            </div>
            <div class="input-group input-group-sm flex-fill">
                <span class="input-group-text">Member</span>
                <input id="trans-search-member" type="search" class="form-control" placeholder="Search by member name">
            </div>
        </div>
    </div>
    <div class="card-body d-flex flex-column" style="min-height: 400px;">
        <div class="table-responsive flex-fill">
            <table class="table table-sm table-hover" id="trans-grid-table">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Account No</th>
                        <th>Member</th>
                        <th>Type</th>
                        <th>Amount</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="trans-grid-body">
                    <tr><td colspan="6" class="text-center text-muted py-3">Loading transactions...<\/td></tr>
                </tbody>
            </table>
        </div>
        <nav class="mt-3">
            <ul class="pagination pagination-sm justify-content-center mb-0" id="pagination-list"></ul>
        </nav>
    </div>
</div>

<style>
    /* Removed the rule that hid the footer: .app-footer { display: none !important; } */
    .container-fluid.content-wrapper, main, .row, .col-12 {
        display: flex !important;
        flex-direction: column !important;
        flex: 1 1 auto !important;
        min-height: 0 !important;
        height: auto !important;
    }
    .card { 
        display: flex; 
        flex-direction: column; 
        flex: 1 1 auto; 
        min-height: 0; 
        height: 100%; 
        margin-bottom: 0; /* Remove extra bottom margin to avoid pushing footer */
    }
    .card-body { 
        display: flex; 
        flex-direction: column; 
        flex: 1 1 auto; 
        min-height: 0; 
        overflow: hidden; 
    }
    .table-responsive { 
        flex: 1 1 auto; 
        min-height: 0; 
        overflow-y: auto; 
    }
    .pagination .page-item.active .page-link { 
        background-color: #0d6efd; 
        border-color: #0d6efd; 
        color: white; 
    }
</style>
{% endblock %}

{% block extra_js %}
<script type="application/json" id="trans-initial-json">{{ initial_data_json|safe }}</script>
<script>
    const tableBody = document.getElementById('trans-grid-body');
    const paginationList = document.getElementById('pagination-list');
    const searchAccount = document.getElementById('trans-search-account');
    const searchMember = document.getElementById('trans-search-member');
    let currentPage = 1, totalPages = 1, searchTimer;

    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.substring(0, name.length + 1) === (name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }

    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function renderTable(transactions) {
        if (!transactions || transactions.length === 0) {
            tableBody.innerHTML = '<tr><td colspan="6" class="text-center text-muted py-3">No transactions found.<\/td><\/tr>';
            return;
        }
        let html = '';
        transactions.forEach(t => {
            html += `<tr>
                <td>${escapeHtml(t.date)}<\/td>
                <td>${escapeHtml(t.account_no)}<\/td>
                <td>${escapeHtml(t.member_name)}<\/td>
                <td>${escapeHtml(t.transaction_type)}<\/td>
                <td>${escapeHtml(t.amount)}<\/td>
                <td>
                    <button class="btn btn-sm btn-danger reverse-trans" data-id="${t.id}">Reverse</button>
                 <\/td>
            </tr>`;
        });
        tableBody.innerHTML = html;
        attachReverseButtons();
    }

    function renderPagination(current, total) {
        currentPage = current;
        totalPages = total;
        if (total <= 1) {
            paginationList.innerHTML = '';
            return;
        }
        let html = '';
        // Previous button
        html += `<li class="page-item ${current === 1 ? 'disabled' : ''}">
                    <a class="page-link" href="#" data-page="${current - 1}">Previous</a>
                </li>`;
        let start = Math.max(1, current - 2);
        let end = Math.min(total, current + 2);
        if (end - start < 4) {
            if (start > 1) start = Math.max(1, end - 4);
            if (end < total) end = Math.min(total, start + 4);
        }
        for (let i = start; i <= end; i++) {
            html += `<li class="page-item ${i === current ? 'active' : ''}">
                        <a class="page-link" href="#" data-page="${i}">${i}</a>
                    </li>`;
        }
        // Next button
        html += `<li class="page-item ${current === total ? 'disabled' : ''}">
                    <a class="page-link" href="#" data-page="${current + 1}">Next</a>
                </li>`;
        paginationList.innerHTML = html;
        // Attach click handlers
        paginationList.querySelectorAll('a.page-link').forEach(link => {
            link.addEventListener('click', function(e) {
                e.preventDefault();
                const page = parseInt(this.dataset.page);
                if (!isNaN(page) && page >= 1 && page <= totalPages && page !== currentPage) {
                    loadTransactions(page);
                }
            });
        });
    }

    function loadTransactions(page = 1) {
        const params = new URLSearchParams({
            account_no: searchAccount.value.trim(),
            member_name: searchMember.value.trim(),
            page: page,
            size: 20
        });
        tableBody.innerHTML = '<tr><td colspan="6" class="text-center text-muted py-3">Loading...<\/td><\/tr>';
        fetch(`{% url 'savings_transaction_data' %}?${params.toString()}`, { credentials: 'same-origin' })
            .then(r => r.json())
            .then(data => {
                renderTable(data.data || []);
                renderPagination(data.current_page || 1, data.last_page || 1);
            })
            .catch(err => {
                console.error(err);
                tableBody.innerHTML = '<tr><td colspan="6" class="text-center text-danger py-3">Unable to load transactions.<\/td><\/tr>';
                paginationList.innerHTML = '';
            });
    }

    function attachReverseButtons() {
        document.querySelectorAll('.reverse-trans').forEach(btn => {
            btn.addEventListener('click', function() {
                if (confirm('Are you sure you want to reverse this transaction? This will create a reversing entry.')) {
                    const id = this.dataset.id;
                    fetch(`/savings/transactions/${id}/reverse/`, {
                        method: 'POST',
                        headers: { 
                            'X-CSRFToken': getCookie('csrftoken'),
                            'X-Requested-With': 'XMLHttpRequest'
                        },
                        credentials: 'same-origin'
                    })
                    .then(r => r.json())
                    .then(data => {
                        if (data.success) {
                            alert(data.message);
                            loadTransactions(currentPage);
                        } else {
                            alert('Error: ' + (data.error || 'Unknown error'));
                        }
                    })
                    .catch(err => alert('An error occurred.'));
                }
            });
        });
    }

    function handleSearch() {
        clearTimeout(searchTimer);
        searchTimer = setTimeout(() => loadTransactions(1), 300);
    }

    document.addEventListener('DOMContentLoaded', function() {
        searchAccount.addEventListener('input', handleSearch);
        searchMember.addEventListener('input', handleSearch);
        try {
            const initial = JSON.parse(document.getElementById('trans-initial-json').textContent || 'null');
            if (initial && Array.isArray(initial.data)) {
                renderTable(initial.data);
                renderPagination(initial.current_page || 1, initial.last_page || 1);
            } else {
                loadTransactions(1);
            }
        } catch(e) {
            loadTransactions(1);
        }
    });
</script>
{% endblock %}
