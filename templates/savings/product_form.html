{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-12 col-lg-8">
        <div class="card">
            <div class="card-header">
                <h2>{% if object %}Edit Savings Product{% else %}Add Savings Product{% endif %}</h2>
            </div>
            <div class="card-body">
                <form method="post" action="{% if object %}{% url 'savings_product_edit' pk=object.pk %}{% else %}{% url 'savings_product_add' %}{% endif %}">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <div class="mt-3">
                        <button type="submit" class="btn btn-success">Save</button>
                        <a href="{% url 'savings_product_list' %}" class="btn btn-secondary">Back</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
