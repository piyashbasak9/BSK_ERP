{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-12 col-lg-8">
        <div class="card">
            <div class="card-header">
                <h2>Add Transaction</h2>
            </div>
            <div class="card-body">
                <form method="post" action="{% url 'savings_transaction_add' %}">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <div class="mt-3">
                        <button type="submit" class="btn btn-success">Save Transaction</button>
                        <a href="{% url 'savings_transaction_list' %}" class="btn btn-secondary">Back</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
<link href="https://cdn.jsdelivr.net/npm/select2-bootstrap-5-theme@1.2.0/dist/select2-bootstrap-5-theme.min.css" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        var accountSelect = document.querySelector('select[name="account"]');
        if (window.jQuery && window.jQuery.fn.select2 && accountSelect) {
            window.jQuery(accountSelect).select2({ width: '100%', theme: 'bootstrap-5', placeholder: 'Select an account' });
        }
    });
</script>
{% endblock %}
