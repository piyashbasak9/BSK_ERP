{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-12 col-lg-6">
        <div class="card">
            <div class="card-header bg-danger text-white">
                <h4 class="mb-0">Confirm Delete</h4>
            </div>
            <div class="card-body">
                <p class="lead">Are you sure you want to delete this Savings Account?</p>
                <div class="alert alert-warning">
                    <strong>Account No:</strong> {{ object.account_no }}<br>
                    <strong>Member:</strong> {{ object.member.name }}<br>
                    <strong>Balance:</strong> ₹{{ object.current_balance }}
                </div>
                <form method="post" class="d-inline">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">Yes, Delete</button>
                    <a href="{% url 'savings_account_list' %}" class="btn btn-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
