{% extends 'base.html' %}

{% block content %}
<div class="row">
    <div class="col-12">
        <div class="card">
            <div class="card-header">
                <h2>Reports</h2>
            </div>
            <div class="card-body">
                <div class="row">
                    {% for report in reports %}
                    <div class="col-md-6 col-lg-4 mb-3">
                        <div class="card h-100">
                            <div class="card-body">
                                <h5 class="card-title">{{ report.name }}</h5>
                                <p class="card-text text-muted">{{ report.description }}</p>
                            </div>
                            <div class="card-footer">
                                <a href="{% url report.url %}" class="btn btn-sm btn-primary">View Report</a>
                            </div>
                        </div>
                    </div>
                    {% endfor %}
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
