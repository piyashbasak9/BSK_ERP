{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-12 col-lg-8">
        <div class="card mb-4">
            <div class="card-header">
                <h2 class="mb-0">{% if object %}Edit Branch{% else %}Add Branch{% endif %}</h2>
            </div>
            <div class="card-body">
                {% if object %}
                <form method="post" action="{% url 'branch_edit' pk=object.pk %}">
                {% else %}
                <form method="post" action="{% url 'branch_add' %}">
                {% endif %}
                    {% csrf_token %}
                    {{ form|crispy }}
                    <div class="mt-3 d-flex gap-2 flex-wrap">
                        <button type="submit" class="btn btn-success">Save</button>
                        <a href="{% url 'branch_list' %}" class="btn btn-secondary">Back</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
