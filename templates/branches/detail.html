{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-12 col-lg-8">
        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h3>{{ object.name }} ({{ object.code }})</h3>
                <div>
                    <a href="{% url 'branch_edit' pk=object.pk %}" class="btn btn-warning btn-sm">Edit</a>
                    <a href="{% url 'branch_delete' pk=object.pk %}" class="btn btn-danger btn-sm">Delete</a>
                    <a href="{% url 'branch_list' %}" class="btn btn-secondary btn-sm">Back</a>
                </div>
            </div>
            <div class="card-body">
                {% include 'branches/branch_detail.html' with object=object %}
            </div>
        </div>
    </div>
</div>
{% endblock %}
