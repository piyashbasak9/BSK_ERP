{% extends 'base.html' %}

{% block content %}
<div class="card">
    <div class="card-header">
        <h2>Audit Logs</h2>
    </div>
    <div class="card-body">
        <div class="alert alert-info">
            <p>Audit logs show system activities including user actions, data changes, and security events.</p>
        </div>
        <div class="table-responsive">
            <table class="table table-striped table-hover">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>User</th>
                        <th>Action</th>
                        <th>IP Address</th>
                        <th>Details</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td colspan="5" class="text-center text-muted">No audit logs available</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
