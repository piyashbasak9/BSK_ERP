{% extends 'base.html' %}

{% block content %}
<div class="card">
    <div class="card-header d-flex justify-content-between align-items-center">
        <h5 class="mb-0">Audit Logs</h5>
        <a href="{% url 'audit_log_export' %}?{{ request.GET.urlencode }}" class="btn btn-success btn-sm">Export CSV</a>
    </div>
    <div class="card-body p-3">
        <!-- Filter form -->
        <form method="get" id="filter-form" class="row g-3 mb-3">
            <div class="col-md-3">
                <label class="form-label">Log Type</label>
                <div id="log-type-checkboxes" style="max-height:120px; overflow-y:auto; border:1px solid #ddd; padding:5px;">
                    {{ filter_form.log_type }}
                </div>
            </div>
            <div class="col-md-2">
                <label class="form-label">User</label>
                {{ filter_form.user }}
            </div>
            <div class="col-md-2">
                <label class="form-label">Start Date</label>
                {{ filter_form.start_date }}
            </div>
            <div class="col-md-2">
                <label class="form-label">End Date</label>
                {{ filter_form.end_date }}
            </div>
            <div class="col-md-3 d-flex align-items-end">
                <button type="submit" class="btn btn-primary me-2">Filter</button>
                <a href="{% url 'audit_log_list' %}" class="btn btn-secondary">Clear</a>
            </div>
        </form>
    </div>
    <div class="card-body d-flex flex-column" style="min-height:400px;">
        <div class="table-responsive flex-fill">
            <table class="table table-sm table-hover" id="log-grid-table">
                <thead><tr><th>Timestamp</th><th>User</th><th>Action</th><th>Resource</th><th>IP Address</th><th>Actions</th></tr></thead>
                <tbody id="log-grid-body"><tr><td colspan="6" class="text-center text-muted py-3">Loading logs...</td></tr></tbody>
            </table>
        </div>
        <nav class="mt-3"><ul class="pagination pagination-sm justify-content-center mb-0" id="pagination-list"></ul></nav>
    </div>
</div>

<style>
    .container-fluid.content-wrapper, main, .row, .col-12 { display: flex !important; flex-direction: column !important; flex:1 1 auto; min-height:0; height:auto; }
    .card { display: flex; flex-direction: column; flex:1 1 auto; min-height:0; height:100%; margin-bottom:0; }
    .card-body { display: flex; flex-direction: column; flex:1 1 auto; min-height:0; overflow:hidden; }
    .table-responsive { flex:1 1 auto; min-height:0; overflow-y:auto; }
    .pagination .page-item.active .page-link { background-color:#0d6efd; border-color:#0d6efd; color:white; }
</style>
{% endblock %}

{% block extra_js %}
<script type="application/json" id="log-initial-json">{{ initial_data_json|safe }}</script>
<script>
    const tableBody = document.getElementById('log-grid-body');
    const paginationList = document.getElementById('pagination-list');
    const filterForm = document.getElementById('filter-form');
    const genericModal = document.getElementById('genericModal');
    let currentPage = 1, totalPages = 1, searchTimer;

    function escapeHtml(str){ if(!str) return ''; return String(str).replace(/[&<>]/g,function(m){return m==='&'?'&amp;':m==='<'?'&lt;':m==='>'?'&gt;':m;}); }

    function renderTable(logs){
        if(!logs||logs.length===0){ tableBody.innerHTML='<tr><td colspan="6" class="text-center text-muted py-3">No logs found.</td></tr>'; return; }
        let html='';
        logs.forEach(l=>{
            html+=`<tr>
                <td>${escapeHtml(l.timestamp)}</td>
                <td>${escapeHtml(l.user)}</td>
                <td>${escapeHtml(l.action)}</td>
                <td>${escapeHtml(l.resource)}</td>
                <td>${escapeHtml(l.ip_address)}</td>
                <td><button class="btn btn-sm btn-info view-detail" data-id="${l.id}">Details</button></td>
            </tr>`;
        });
        tableBody.innerHTML=html;
        attachDetailButtons();
    }

    function renderPagination(current,total){
        currentPage=current; totalPages=total;
        if(total<=1){ paginationList.innerHTML=''; return; }
        let html=`<li class="page-item ${current===1?'disabled':''}"><a class="page-link" href="#" data-page="${current-1}">Previous</a></li>`;
        let start=Math.max(1,current-2), end=Math.min(total,current+2);
        if(end-start<4){ if(start>1) start=Math.max(1,end-4); if(end<total) end=Math.min(total,start+4); }
        for(let i=start;i<=end;i++) html+=`<li class="page-item ${i===current?'active':''}"><a class="page-link" href="#" data-page="${i}">${i}</a></li>`;
        html+=`<li class="page-item ${current===total?'disabled':''}"><a class="page-link" href="#" data-page="${current+1}">Next</a></li>`;
        paginationList.innerHTML=html;
        paginationList.querySelectorAll('a.page-link').forEach(link=>link.addEventListener('click',e=>{ e.preventDefault(); let page=parseInt(link.dataset.page); if(!isNaN(page)&&page>=1&&page<=totalPages&&page!==currentPage) loadLogs(page); }));
    }

    function loadLogs(page=1){
        const params=new URLSearchParams(new FormData(filterForm));
        params.set('page',page); params.set('size',20);
        tableBody.innerHTML='<tr><td colspan="6" class="text-center text-muted py-3">Loading...</td></tr>';
        fetch(`{% url 'audit_log_data' %}?${params.toString()}`,{credentials:'same-origin'})
            .then(r=>r.json())
            .then(data=>{ renderTable(data.data||[]); renderPagination(data.current_page||1, data.last_page||1); })
            .catch(err=>{ tableBody.innerHTML='<tr><td colspan="6" class="text-danger">Error loading logs.</td></tr>'; });
    }

    function attachDetailButtons(){
        document.querySelectorAll('.view-detail').forEach(btn=>{
            btn.addEventListener('click',function(e){
                const id=this.dataset.id;
                fetch(`/audit/logs/${id}/`,{credentials:'same-origin'})
                    .then(r=>r.json())
                    .then(data=>{
                        const modalBody=genericModal.querySelector('.modal-body');
                        const modalTitle=genericModal.querySelector('.modal-title');
                        modalTitle.textContent='Audit Log Detail';
                        modalBody.innerHTML=`
                            <dl class="row">
                                <dt class="col-sm-4">Timestamp</dt><dd class="col-sm-8">${data.timestamp}</dd>
                                <dt class="col-sm-4">User</dt><dd class="col-sm-8">${data.user}</dd>
                                <dt class="col-sm-4">Action</dt><dd class="col-sm-8">${data.action}</dd>
                                <dt class="col-sm-4">Resource</dt><dd class="col-sm-8">${data.resource} (ID: ${data.resource_id})</dd>
                                <dt class="col-sm-4">IP Address</dt><dd class="col-sm-8">${data.ip_address}</dd>
                                <dt class="col-sm-4">User Agent</dt><dd class="col-sm-8"><small>${data.user_agent}</small></dd>
                                <dt class="col-sm-4">Old Values</dt><dd class="col-sm-8"><pre>${JSON.stringify(data.old_values,null,2)}</pre></dd>
                                <dt class="col-sm-4">New Values</dt><dd class="col-sm-8"><pre>${JSON.stringify(data.new_values,null,2)}</pre></dd>
                            </dl>
                        `;
                        new bootstrap.Modal(genericModal).show();
                    })
                    .catch(err=>alert('Could not load details'));
            });
        });
    }

    // Auto-submit on filter changes
    filterForm.querySelectorAll('input, select').forEach(el=>el.addEventListener('change',()=>loadLogs(1)));
    document.addEventListener('DOMContentLoaded',()=>loadLogs(1));
</script>
{% endblock %}
