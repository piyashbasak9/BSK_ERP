{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block content %}
<div class="row justify-content-center" style="flex:1;min-height:0;">
    <div class="col-12 col-lg-8" style="display:flex;flex-direction:column;">
        <div class="card" style="flex:1;margin-bottom:0!important;">
            <div class="card-header"><h2>System Settings</h2></div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <div class="mt-3"><button type="submit" class="btn btn-success">Save Changes</button> <a href="{% url 'settings_dashboard' %}" class="btn btn-secondary">Back</a></div>
                </form>
            </div>
        </div>
    </div>
</div>
<style>.row{flex:1;min-height:0;margin:0;width:100%;}.col-12{display:flex;flex-direction:column;height:100%;}.card{flex:1;display:flex;flex-direction:column;margin-bottom:0!important;}.card-body{flex:1;overflow-y:auto;}</style>
{% endblock %}
