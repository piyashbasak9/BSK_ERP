{% extends 'base.html' %}

{% block content %}
<div class="card">
    <div class="card-header d-flex justify-content-between align-items-center">
        <h5>Branch Management</h5>
        <a href="{% url 'branch_add' %}" class="btn btn-success btn-sm">+ Add Branch</a>
    </div>
    <div class="card-body p-0">
        <div class="table-responsive">
            <table class="table table-sm table-hover mb-0">
                <thead><tr><th>Code</th><th>Name</th><th>Phone</th><th>Email</th><th>Active</th><th>Actions</th></tr></thead>
                <tbody>
                    {% for b in branches %}
                    <tr>
                        <td>{{ b.code }}</td><td>{{ b.name }}</td><td>{{ b.phone }}</td><td>{{ b.email }}</td>
                        <td>{{ b.is_active|yesno:"Yes,No" }}</td>
                        <td><a href="{% url 'branch_edit' b.pk %}" class="btn btn-sm btn-warning me-1">Edit</a><a href="{% url 'branch_delete' b.pk %}" class="btn btn-sm btn-danger">Delete</a></td>
                    </tr>
                    {% empty %}<tr><td colspan="6">No branches found.</td></tr>{% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
