{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block content %}
<div class="row justify-content-center"><div class="col-md-8"><div class="card"><div class="card-header"><h2>{% if object %}Edit Branch{% else %}Add Branch{% endif %}</h2></div><div class="card-body"><form method="post">{% csrf_token %}{{ form|crispy }}<button type="submit" class="btn btn-success">Save</button> <a href="{% url 'branch_management' %}" class="btn btn-secondary">Cancel</a></form></div></div></div></div>
{% endblock %}
