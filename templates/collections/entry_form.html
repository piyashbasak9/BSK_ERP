{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-12 col-lg-8">
        <div class="card mb-4">
            <div class="card-header">
                <h2 class="mb-0">New Collection Entry</h2>
            </div>
            <div class="card-body">
                <form method="post" action="{% url 'collections_entry_add' %}">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <div class="mt-3 d-flex gap-2 flex-wrap">
                        <button type="submit" class="btn btn-success">Save</button>
                        <a href="{% url 'collections_entry_list' %}" class="btn btn-secondary">Back</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
