{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block content %}
<div class="row justify-content-center" style="flex: 1; min-height: 0;">
    <div class="col-12 col-lg-8" style="display: flex; flex-direction: column;">
        <div class="card mb-4" style="flex: 1; margin-bottom: 0 !important;">
            <div class="card-header">
                <h2 class="mb-0">{% if object %}Edit Collection Sheet{% else %}Add Collection Sheet{% endif %}</h2>
            </div>
            <div class="card-body">
                <form method="post" action="{% if object %}{% url 'collections_sheet_edit' pk=object.pk %}{% else %}{% url 'collections_sheet_add' %}{% endif %}">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <div class="mt-3 d-flex gap-2 flex-wrap">
                        <button type="submit" class="btn btn-success">Save</button>
                        <a href="{% url 'collections_sheet_list' %}" class="btn btn-secondary">Back</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<style>
    .row.justify-content-center {
        flex: 1;
        min-height: 0;
        margin: 0;
        width: 100%;
    }
    .col-12 {
        display: flex;
        flex-direction: column;
        height: 100%;
    }
    .card {
        flex: 1;
        display: flex;
        flex-direction: column;
        margin-bottom: 0 !important;
    }
    .card-body {
        flex: 1;
        overflow-y: auto;
    }
    body, .content-wrapper {
        overflow-x: hidden;
    }
</style>
{% endblock %}

{% block extra_js %}
<link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
<link href="https://cdn.jsdelivr.net/npm/select2-bootstrap-5-theme@1.2.0/dist/select2-bootstrap-5-theme.min.css" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        var branchSelect = document.querySelector('select[name="branch"]');
        if (window.jQuery && window.jQuery.fn.select2 && branchSelect) {
            window.jQuery(branchSelect).select2({
                width: '100%',
                theme: 'bootstrap-5',
                placeholder: 'Select a branch',
                minimumResultsForSearch: 0,
                dropdownAutoWidth: true,
                allowClear: false
            });
            branchSelect.dataset.select2Initialized = 'true';
        }
    });
</script>
{% endblock %}
