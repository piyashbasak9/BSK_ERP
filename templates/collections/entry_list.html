{% extends 'base.html' %}

{% block content %}
<div class="card">
    <div class="card-header d-flex justify-content-between align-items-center">
        <h5 class="mb-0">Collection Entries</h5>
        <a class="btn btn-success btn-sm" href="{% url 'collections_entry_add' %}">+ Add Collection Entry</a>
    </div>
    <div class="search-controls p-3">
        <div class="d-flex gap-2">
            <div class="input-group input-group-sm flex-fill">
                <span class="input-group-text">Member Name</span>
                <input id="entry-search-member" type="search" class="form-control" placeholder="Search by member name">
            </div>
            <div class="input-group input-group-sm flex-fill">
                <span class="input-group-text">Collection Type</span>
                <select id="entry-search-type" class="form-select">
                    <option value="">All types</option>
                    <option value="loan">Loan Installment</option>
                    <option value="savings">Savings Deposit</option>
                    <option value="fee">Processing Fee</option>
                </select>
            </div>
        </div>
    </div>
    <div class="card-body d-flex flex-column" style="min-height: 400px;">
        <div class="table-responsive flex-fill">
            <table class="table table-sm table-hover" id="entry-grid-table">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Member</th>
                        <th>Collection Type</th>
                        <th>Amount</th>
                    </tr>
                </thead>
                <tbody id="entry-grid-body">
                    <td><td colspan="4" class="text-center text-muted py-3">Loading collection entries...<\/td></tr>
                </tbody>
            </table>
        </div>
        <nav class="mt-3">
            <ul class="pagination pagination-sm justify-content-center mb-0" id="pagination-list"></ul>
        </nav>
    </div>
</div>

<style>
    .container-fluid.content-wrapper, main, .row, .col-12 {
        display: flex !important;
        flex-direction: column !important;
        flex: 1 1 auto !important;
        min-height: 0 !important;
        height: auto !important;
    }
    .card {
        display: flex;
        flex-direction: column;
        flex: 1 1 auto;
        min-height: 0;
        height: 100%;
        margin-bottom: 0;
    }
    .card-body {
        display: flex;
        flex-direction: column;
        flex: 1 1 auto;
        min-height: 0;
        overflow: hidden;
    }
    .table-responsive {
        flex: 1 1 auto;
        min-height: 0;
        overflow-y: auto;
    }
    .pagination .page-item.active .page-link {
        background-color: #0d6efd;
        border-color: #0d6efd;
        color: white;
    }
</style>
{% endblock %}

{% block extra_js %}
<script type="application/json" id="entry-initial-json">{{ initial_data_json|safe }}</script>
<script>
    const tableBody = document.getElementById('entry-grid-body');
    const paginationList = document.getElementById('pagination-list');
    const searchMember = document.getElementById('entry-search-member');
    const searchType = document.getElementById('entry-search-type');
    let currentPage = 1, totalPages = 1, searchTimer;

    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function renderTable(entries) {
        if (!entries || entries.length === 0) {
            tableBody.innerHTML = '<tr><td colspan="4" class="text-center text-muted py-3">No collection entries found.<\/td><\/tr>';
            return;
        }
        let html = '';
        entries.forEach(e => {
            html += `<tr>
                <td>${escapeHtml(e.date)}<\/td>
                <td>${escapeHtml(e.member_name)}<\/td>
                <td>${escapeHtml(e.collection_type)}<\/td>
                <td>${escapeHtml(e.amount)}<\/td>
            </tr>`;
        });
        tableBody.innerHTML = html;
    }

    function renderPagination(current, total) {
        currentPage = current;
        totalPages = total;
        if (total <= 1) {
            paginationList.innerHTML = '';
            return;
        }
        let html = `<li class="page-item ${current === 1 ? 'disabled' : ''}">
                        <a class="page-link" href="#" data-page="${current-1}">Previous</a>
                    </li>`;
        let start = Math.max(1, current-2);
        let end = Math.min(total, current+2);
        if (end - start < 4) {
            if (start > 1) start = Math.max(1, end-4);
            if (end < total) end = Math.min(total, start+4);
        }
        for (let i = start; i <= end; i++) {
            html += `<li class="page-item ${i === current ? 'active' : ''}">
                        <a class="page-link" href="#" data-page="${i}">${i}</a>
                    </li>`;
        }
        html += `<li class="page-item ${current === total ? 'disabled' : ''}">
                    <a class="page-link" href="#" data-page="${current+1}">Next</a>
                </li>`;
        paginationList.innerHTML = html;
        paginationList.querySelectorAll('a.page-link').forEach(link => {
            link.addEventListener('click', function(e) {
                e.preventDefault();
                let page = parseInt(this.dataset.page);
                if (!isNaN(page) && page >= 1 && page <= totalPages && page !== currentPage) {
                    loadEntries(page);
                }
            });
        });
    }

    function loadEntries(page = 1) {
        const params = new URLSearchParams({
            member_name: searchMember.value.trim(),
            collection_type: searchType.value.trim(),
            page: page,
            size: 20
        });
        tableBody.innerHTML = '<tr><td colspan="4" class="text-center text-muted py-3">Loading...<\/td><\/tr>';
        fetch(`{% url 'collections_entry_data' %}?${params.toString()}`, { credentials: 'same-origin' })
            .then(r => r.json())
            .then(data => {
                renderTable(data.data || []);
                renderPagination(data.current_page || 1, data.last_page || 1);
            })
            .catch(err => {
                console.error(err);
                tableBody.innerHTML = '<tr><td colspan="4" class="text-center text-danger py-3">Unable to load entries.<\/td><\/tr>';
                paginationList.innerHTML = '';
            });
    }

    function handleSearch() {
        clearTimeout(searchTimer);
        searchTimer = setTimeout(() => loadEntries(1), 300);
    }

    document.addEventListener('DOMContentLoaded', function() {
        searchMember.addEventListener('input', handleSearch);
        searchType.addEventListener('change', handleSearch);
        try {
            const initial = JSON.parse(document.getElementById('entry-initial-json').textContent || 'null');
            if (initial && Array.isArray(initial.data)) {
                renderTable(initial.data);
                renderPagination(initial.current_page || 1, initial.last_page || 1);
            } else {
                loadEntries(1);
            }
        } catch(e) {
            loadEntries(1);
        }
    });
</script>
{% endblock %}
