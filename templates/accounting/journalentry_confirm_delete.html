{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h2 class="mb-0">Confirm Delete</h2>
            </div>
            <div class="card-body">
                <p>Are you sure you want to delete the journal entry <strong>{{ object.voucher_no }}</strong>?</p>
                <p><strong>Date:</strong> {{ object.date }}</p>
                <p><strong>Description:</strong> {{ object.description }}</p>
                <p class="text-warning">This action cannot be undone.</p>
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">Delete</button>
                    <a href="{% url 'journalentry_list' %}" class="btn btn-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
