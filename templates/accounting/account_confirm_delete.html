{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h2 class="mb-0">Confirm Delete</h2>
            </div>
            <div class="card-body">
                <p>Are you sure you want to delete the account <strong>{{ object.code }} - {{ object.name }}</strong>?</p>
                <p class="text-warning">This action cannot be undone if the account has transactions.</p>
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">Delete</button>
                    <a href="{% url 'account_list' %}" class="btn btn-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
