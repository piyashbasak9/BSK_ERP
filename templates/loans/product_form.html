{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block content %}
<div class="row justify-content-center" style="flex: 1; min-height: 0;">
    <div class="col-12 col-lg-8" style="display: flex; flex-direction: column;">
        <div class="card mb-4" style="flex: 1; margin-bottom: 0 !important;">
            <div class="card-header">
                <h2 class="mb-0">{% if object %}Edit Loan Product{% else %}Add Loan Product{% endif %}</h2>
            </div>
            <div class="card-body">
                {% if object %}
                <form method="post" action="{% url 'loans_product_edit' pk=object.pk %}">
                {% else %}
                <form method="post" action="{% url 'loans_product_add' %}">
                {% endif %}
                    {% csrf_token %}
                    {{ form|crispy }}
                    <div class="mt-3 d-flex gap-2 flex-wrap">
                        <button type="submit" class="btn btn-success">Save</button>
                        <a href="{% url 'loans_product_list' %}" class="btn btn-secondary">Back</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<style>
    /* Ensure the row takes full height so footer stays at bottom */
    .row.justify-content-center {
        flex: 1;
        min-height: 0;
        margin: 0;
        width: 100%;
    }
    .col-12 {
        display: flex;
        flex-direction: column;
        height: 100%;
    }
    .card {
        flex: 1;
        display: flex;
        flex-direction: column;
        margin-bottom: 0 !important;
    }
    .card-body {
        flex: 1;
        overflow-y: auto;
    }
    /* Remove any extra margin/padding that might cause overflow */
    body, .content-wrapper {
        overflow-x: hidden;
    }
</style>
{% endblock %}
