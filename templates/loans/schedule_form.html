{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-12 col-lg-8">
        <div class="card mb-4">
            <div class="card-header">
                <h2 class="mb-0">Edit Installment Schedule</h2>
            </div>
            <div class="card-body">
                <form method="post" action="{% url 'loans_schedule_edit' pk=object.pk %}">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <div class="mt-3 d-flex gap-2 flex-wrap">
                        <button type="submit" class="btn btn-success">Save</button>
                        <a href="{% url 'loans_schedule_list' %}" class="btn btn-secondary">Back</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
<link href="https://cdn.jsdelivr.net/npm/select2-bootstrap-5-theme@1.2.0/dist/select2-bootstrap-5-theme.min.css" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        var loanSelect = document.querySelector('select[name="loan"]');
        if (window.jQuery && window.jQuery.fn.select2 && loanSelect) {
            window.jQuery(loanSelect).select2({
                width: '100%',
                theme: 'bootstrap-5',
                placeholder: 'Select a loan application',
                minimumResultsForSearch: 0,
                dropdownAutoWidth: true,
                allowClear: false
            });
            loanSelect.dataset.select2Initialized = 'true';
        }
    });
</script>
{% endblock %}
