{% extends 'base.html' %}

{% block content %}
<div class="card loan-product-card">
    <div class="card-header d-flex justify-content-between align-items-center">
        <h5 class="mb-0">Loan Disbursements</h5>
        <a class="btn btn-success btn-sm" href="{% url 'loans_disbursement_add' %}">+ Add Disbursement</a>
    </div>
    <div class="search-controls p-3">
        <div class="d-flex gap-2" style="flex-wrap: nowrap; overflow-x: auto;">
            <div class="input-group input-group-sm flex-fill" style="min-width: 0;">
                <span class="input-group-text">Member</span>
                <input id="disbursement-search-member" type="search" class="form-control" placeholder="Search by member name">
            </div>
            <div class="input-group input-group-sm flex-fill" style="min-width: 0;">
                <span class="input-group-text">Method</span>
                <input id="disbursement-search-method" type="search" class="form-control" placeholder="Search by method">
            </div>
        </div>
    </div>
    <div class="card-body d-flex flex-column" style="min-height: 0;">
        <div class="table-responsive loan-product-table-container flex-fill" style="min-height: 0; overflow-y: auto;">
            <table class="table table-sm table-hover" id="disbursement-grid-table">
                <thead>
                    <tr>
                        <th>Disbursement Date</th>
                        <th>Member</th>
                        <th>Amount</th>
                        <th>Method</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="disbursement-grid-body">
                    <td><td colspan="5" class="text-center text-muted py-3">Loading disbursements...<\/td></tr>
                </tbody>
            </table>
        </div>
        <!-- Pagination container removed -->
    </div>
</div>

<style>
    /* Removed .app-footer { display: none !important; } – footer is now visible */
    .container-fluid.content-wrapper, main, .row, .col-12 {
        display: flex !important;
        flex-direction: column !important;
        flex: 1 1 auto !important;
        min-height: 0 !important;
        height: auto !important;
    }
    .loan-product-card {
        display: flex;
        flex-direction: column;
        flex: 1 1 auto;
        min-height: 0;
        height: 100%;
        margin-bottom: 0;
    }
    .loan-product-card .card-body {
        display: flex;
        flex-direction: column;
        flex: 1 1 auto;
        min-height: 0;
        overflow: hidden;
    }
    .loan-product-table-container {
        flex: 1 1 auto;
        min-height: 0;
        overflow-y: auto;
    }
    .loan-product-table-container table {
        margin-bottom: 0;
    }
</style>
{% endblock %}

{% block extra_js %}
<script type="application/json" id="disbursement-initial-json">{{ initial_data_json|safe }}</script>
<script>
    const tableBody = document.getElementById('disbursement-grid-body');
    const searchMember = document.getElementById('disbursement-search-member');
    const searchMethod = document.getElementById('disbursement-search-method');
    let searchTimer;

    function escapeHtml(str) {
        if (str === null || str === undefined) return '';
        return String(str).replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function renderDisbursementTable(items) {
        if (!items || items.length === 0) {
            tableBody.innerHTML = '<tr><td colspan="5" class="text-center text-muted py-3">No disbursements found.<\/td><\/tr>';
            return;
        }
        let html = '';
        items.forEach(item => {
            html += `
                <tr>
                    <td>${escapeHtml(item.disbursement_date)}<\/td>
                    <td>${escapeHtml(item.member_name)}<\/td>
                    <td>${escapeHtml(item.amount)}<\/td>
                    <td>${escapeHtml(item.method)}<\/td>
                    <td>
                        <a href="/loans/disbursements/${item.id}/edit/" class="btn btn-sm btn-warning">Edit</a>
                    <\/td>
                <\/tr>
            `;
        });
        tableBody.innerHTML = html;
    }

    function loadDisbursements() {
        const params = new URLSearchParams({
            member_name: searchMember.value.trim(),
            method: searchMethod.value.trim()
        });
        tableBody.innerHTML = '<tr><td colspan="5" class="text-center text-muted py-3">Loading...<\/td><\/tr>';
        fetch(`{% url 'loans_disbursement_data' %}?${params.toString()}`, { credentials: 'same-origin' })
            .then(response => response.json())
            .then(data => {
                renderDisbursementTable(data.data || []);
            })
            .catch(err => {
                console.error('Disbursement load error', err);
                tableBody.innerHTML = '<tr><td colspan="5" class="text-center text-danger py-3">Unable to load disbursements.<\/td><\/tr>';
            });
    }

    function handleSearch() {
        clearTimeout(searchTimer);
        searchTimer = setTimeout(() => loadDisbursements(), 300);
    }

    document.addEventListener('DOMContentLoaded', function() {
        searchMember.addEventListener('input', handleSearch);
        searchMethod.addEventListener('input', handleSearch);
        try {
            const initial = JSON.parse(document.getElementById('disbursement-initial-json').textContent || 'null');
            if (initial && Array.isArray(initial.data)) {
                renderDisbursementTable(initial.data);
            } else {
                loadDisbursements();
            }
        } catch(e) {
            loadDisbursements();
        }
    });
</script>
{% endblock %}
