{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-12 col-lg-6">
        <div class="card">
            <div class="card-header">
                <h3 class="mb-0">Edit Disbursement</h3>
            </div>
            <div class="card-body">
                <div class="alert alert-info">
                    <strong>Loan:</strong> {{ loan_info }}<br>
                    <strong>Disbursed Amount:</strong> {{ original_amount }} (Cannot be changed)
                </div>
                <form method="post">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <div class="mt-3">
                        <button type="submit" class="btn btn-primary">Save Changes</button>
                        <a href="{% url 'loans_disbursement_list' %}" class="btn btn-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
