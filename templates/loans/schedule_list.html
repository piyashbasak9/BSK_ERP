{% extends 'base.html' %}

{% block content %}
<div class="card loan-product-card">
    <div class="card-header d-flex justify-content-between align-items-center">
        <h5 class="mb-0">Loan Installment Schedules</h5>
    </div>
    <div class="search-controls p-3">
        <div class="d-flex gap-2">
            <div class="input-group input-group-sm flex-fill">
                <span class="input-group-text">Member</span>
                <input id="schedule-search-member" type="search" class="form-control" placeholder="Search by member name">
            </div>
        </div>
    </div>
    <div class="card-body d-flex flex-column" style="min-height: 0;">
        <div class="table-responsive loan-product-table-container flex-fill" style="min-height: 0; overflow-y: auto;">
            <table class="table table-sm table-hover" id="schedule-grid-table">
                <thead>
                    <tr>
                        <th>Member</th>
                        <th>Installment #</th>
                        <th>Due Date</th>
                        <th>Principal</th>
                        <th>Interest</th>
                        <th>Total Due</th>
                        <th>Paid</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="schedule-grid-body">
                    <tr><td colspan="8" class="text-center text-muted py-3">Loading schedules...</td></tr>
                </tbody>
            </table>
        </div>
        <nav id="pagination-container" class="mt-3 flex-shrink-0">
            <ul class="pagination pagination-sm justify-content-center mb-0" id="pagination-list"></ul>
        </nav>
    </div>
</div>

<!-- Payment Modal -->
<div class="modal fade" id="paymentModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Make Payment</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body" id="payment-modal-body">
                Loading...
            </div>
        </div>
    </div>
</div>

<style>
    .app-footer { display: none !important; }
    .container-fluid.content-wrapper, main, .row, .col-12 {
        display: flex !important;
        flex-direction: column !important;
        flex: 1 1 auto !important;
        min-height: 0 !important;
        height: auto !important;
    }
    .loan-product-card {
        display: flex;
        flex-direction: column;
        flex: 1 1 auto;
        min-height: 0;
        height: 100%;
    }
    .loan-product-card .card-body {
        display: flex;
        flex-direction: column;
        flex: 1 1 auto;
        min-height: 0;
        overflow: hidden;
    }
    .loan-product-table-container {
        flex: 1 1 auto;
        min-height: 0;
        overflow-y: auto;
    }
    .loan-product-table-container table {
        margin-bottom: 0;
    }
    .pagination .page-item.active .page-link {
        background-color: #0d6efd;
        border-color: #0d6efd;
        color: white;
    }
</style>
{% endblock %}

{% block extra_js %}
<script type="application/json" id="schedule-initial-json">{{ initial_data_json|safe }}</script>
<script>
    const tableBody = document.getElementById('schedule-grid-body');
    const paginationList = document.getElementById('pagination-list');
    const searchMember = document.getElementById('schedule-search-member');
    const paymentModal = new bootstrap.Modal(document.getElementById('paymentModal'));
    let currentPage = 1;
    let totalPages = 1;
    let searchTimer;

    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function renderScheduleTable(schedules) {
        if (!schedules.length) {
            tableBody.innerHTML = '<tr><td colspan="8" class="text-center text-muted">No schedules found.</td></tr>';
            return;
        }
        let html = '';
        schedules.forEach(s => {
            const isPaid = s.is_paid === 'Yes';
            const remainingDue = parseFloat(s.total_due) - (parseFloat(s.paid_total) || 0);
            html += `
                <tr class="${isPaid ? 'table-success' : (remainingDue > 0 ? 'table-warning' : '')}">
                    <td>${escapeHtml(s.member_name)}</td>
                    <td>${escapeHtml(s.installment_no)}</td>
                    <td>${escapeHtml(s.due_date)}</td>
                    <td>${escapeHtml(s.principal_amount)}</td>
                    <td>${escapeHtml(s.interest_amount)}</td>
                    <td>${escapeHtml(s.total_due)}</td>
                    <td>${escapeHtml(s.is_paid)}</td>
                    <td>
                        ${!isPaid ? `<button class="btn btn-sm btn-primary pay-schedule" data-id="${s.id}">Pay</button>` : ''}
                        <a href="/loans/schedules/${s.id}/edit/" class="btn btn-sm btn-warning">Edit</a>
                    </td>
                </tr>
            `;
        });
        tableBody.innerHTML = html;
        attachPayButtons();
    }

    function attachPayButtons() {
        document.querySelectorAll('.pay-schedule').forEach(btn => {
            btn.addEventListener('click', function(e) {
                const scheduleId = this.dataset.id;
                openPaymentModal(scheduleId);
            });
        });
    }

    function openPaymentModal(scheduleId) {
        const modalBody = document.getElementById('payment-modal-body');
        modalBody.innerHTML = '<div class="text-center"><div class="spinner-border"></div> Loading...</div>';
        paymentModal.show();

        fetch(`/loans/schedules/${scheduleId}/pay/`, { credentials: 'same-origin' })
            .then(response => response.json())
            .then(data => {
                if (data.form_html) {
                    modalBody.innerHTML = `
                        <div class="mb-3">
                            <p><strong>Member:</strong> ${escapeHtml(data.member_name)}</p>
                            <p><strong>Installment #:</strong> ${data.installment_no}</p>
                            <p><strong>Due Date:</strong> ${data.due_date}</p>
                            <p><strong>Total Due:</strong> ${data.total_due}</p>
                            <p><strong>Already Paid:</strong> ${data.paid_total}</p>
                            <p><strong>Remaining Due:</strong> ${data.remaining_due}</p>
                            <p><strong>Late Fee:</strong> ${data.late_fee}</p>
                        </div>
                        ${data.form_html}
                    `;
                    const form = document.getElementById('payment-form');
                    if (form) {
                        form.addEventListener('submit', handlePaymentSubmit);
                    }
                } else {
                    modalBody.innerHTML = '<div class="alert alert-danger">Failed to load payment form.</div>';
                }
            })
            .catch(err => {
                console.error(err);
                modalBody.innerHTML = '<div class="alert alert-danger">Error loading payment form.</div>';
            });
    }


    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.substring(0, name.length + 1) === (name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }

    function handlePaymentSubmit(e) {
        e.preventDefault();
        const form = e.target;
        const formData = new FormData(form);
        const submitUrl = form.action;
        const modalBody = document.getElementById('payment-modal-body');
        modalBody.innerHTML = '<div class="text-center"><div class="spinner-border"></div> Processing...</div>';

        const csrftoken = getCookie('csrftoken');

        fetch(submitUrl, {
            method: 'POST',
            body: formData,
            credentials: 'same-origin',
            headers: {
                'X-Requested-With': 'XMLHttpRequest',
                'X-CSRFToken': csrftoken  // ✅ Add CSRF token here
            }
        })
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                paymentModal.hide();
                loadSchedules(currentPage);
                alert(`Success: ${data.message}`);
            } else {
                modalBody.innerHTML = `
                    <div class="alert alert-danger">${data.error}</div>
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                `;
            }
        })
        .catch(err => {
            modalBody.innerHTML = '<div class="alert alert-danger">An error occurred. Please try again.</div>';
        });
    }

    function renderPagination(current, total) {
        currentPage = current;
        totalPages = total;
        if (total <= 1) {
            paginationList.innerHTML = '';
            return;
        }
        let html = `
            <li class="page-item ${current === 1 ? 'disabled' : ''}">
                <a class="page-link" href="#" data-page="${current-1}">Previous</a>
            </li>
        `;
        let start = Math.max(1, current-2);
        let end = Math.min(total, current+2);
        if (end-start < 4) {
            if (start > 1) start = Math.max(1, end-4);
            if (end < total) end = Math.min(total, start+4);
        }
        for (let i = start; i <= end; i++) {
            html += `<li class="page-item ${i===current?'active':''}"><a class="page-link" href="#" data-page="${i}">${i}</a></li>`;
        }
        html += `<li class="page-item ${current===total?'disabled':''}"><a class="page-link" href="#" data-page="${current+1}">Next</a></li>`;
        paginationList.innerHTML = html;
        paginationList.querySelectorAll('a.page-link').forEach(link => {
            link.addEventListener('click', function(e) {
                e.preventDefault();
                let page = parseInt(this.dataset.page);
                if (!isNaN(page) && page>=1 && page<=totalPages && page !== currentPage) {
                    loadSchedules(page);
                }
            });
        });
    }

    function loadSchedules(page=1) {
        currentPage = page;
        const params = new URLSearchParams({
            member_name: searchMember.value.trim(),
            page: page,
            size: 20
        });
        tableBody.innerHTML = '<tr><td colspan="8" class="text-center">Loading...</td></tr>';
        fetch(`{% url 'loans_schedule_data' %}?${params.toString()}`, {credentials: 'same-origin'})
            .then(res => res.json())
            .then(data => {
                renderScheduleTable(data.data || []);
                renderPagination(data.current_page || 1, data.last_page || 1);
            })
            .catch(err => {
                console.error(err);
                tableBody.innerHTML = '<tr><td colspan="8" class="text-danger">Failed to load schedules.</td></tr>';
            });
    }

    function handleSearch() {
        clearTimeout(searchTimer);
        searchTimer = setTimeout(() => loadSchedules(1), 300);
    }

    document.addEventListener('DOMContentLoaded', function() {
        searchMember.addEventListener('input', handleSearch);
        loadSchedules(1);
    });
</script>
{% endblock %}
