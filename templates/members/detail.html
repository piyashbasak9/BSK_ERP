{% extends 'base.html' %}

{% block content %}
<h2>Member Detail</h2>
<table class="table table-bordered">
    <tr><th>ID</th><td>{{ object.member_id }}</td></tr>
    <tr><th>Name</th><td>{{ object.name }}</td></tr>
    <tr><th>Phone</th><td>{{ object.phone }}</td></tr>
    <tr><th>Branch</th><td>{{ object.branch.name }}</td></tr>
    <tr><th>Registration Date</th><td>{{ object.registration_date }}</td></tr>
    <tr><th>Status</th><td>{{ object.is_active|yesno:'Active,Inactive' }}</td></tr>
</table>
<a href="{% url 'member_list' %}" class="btn btn-secondary">Back</a>
{% endblock %}
